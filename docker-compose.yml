version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=caresync
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
    ports:
      - "5432:5432"

  web:
    build: .
    command: sh -c "python manage.py migrate && python create_superuser.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://admin:admin123@db:5432/caresync
      - DJANGO_DEBUG=True
    depends_on:
      - db

volumes:
  postgres_data:
