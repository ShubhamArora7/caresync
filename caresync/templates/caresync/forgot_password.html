{% extends 'caresync/base.html' %}

{% block public_content %}
<section class="py-5 bg-light-subtle d-flex align-items-center" style="min-height: 80vh;">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 animate-fade-in">
                <div class="glass-panel p-4 p-md-5 border-2 shadow-lg">
                    <div class="text-center mb-4">
                        <img src="/static/images/logo2.png?v=2" alt="CareSync Logo" class="mb-3" style="height: 60px;">
                        <h2 class="fw-bold font-heading mb-1 text-dark" style="color: var(--text-main) !important;">Forgot Password</h2>
                        <p class="text-muted small">Enter your registered email address to receive a secure password reset verification code.</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-muted small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" name="email" class="form-control border-start-0 border-secondary border-opacity-25" placeholder="name@example.com" required>
                            </div>
                        </div>
                        
                        <div class="d-flex flex-column gap-2">
                            <button type="submit" class="btn btn-primary-custom w-100 py-3">
                                <i class="fa-solid fa-paper-plane me-2"></i>Send Verification Code
                            </button>
                            <a href="{% url 'login' %}" class="btn btn-secondary-custom w-100 py-3 text-center">
                                Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
