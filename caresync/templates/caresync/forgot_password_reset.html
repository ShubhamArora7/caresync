{% extends 'caresync/base.html' %}

{% block public_content %}
<section class="py-5 bg-light-subtle d-flex align-items-center" style="min-height: 80vh;">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 animate-fade-in">
                <div class="glass-panel p-4 p-md-5 border-2 shadow-lg">
                    <div class="text-center mb-4">
                        <img src="/static/images/logo2.png?v=2" alt="CareSync Logo" class="mb-3" style="height: 60px;">
                        <h2 class="fw-bold font-heading mb-1 text-dark" style="color: var(--text-main) !important;">Reset Password</h2>
                        <p class="text-muted small">Choose a strong, secure new password for your account.</p>
                    </div>

                    {% if errors %}
                    <div class="alert alert-danger glass-panel border-start border-danger border-5 mb-4 text-dark" style="color: var(--text-main) !important;" role="alert">
                        <h6 class="fw-bold"><i class="fa-solid fa-circle-exclamation me-2"></i>Please resolve the following:</h6>
                        <ul class="mb-0 small text-danger">
                            {% for error in errors %}
                                <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted small">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" name="new_password1" class="form-control border-start-0 border-secondary border-opacity-25" placeholder="••••••••" required autocomplete="new-password">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" name="new_password2" class="form-control border-start-0 border-secondary border-opacity-25" placeholder="••••••••" required autocomplete="new-password">
                            </div>
                        </div>
                        
                        <div class="d-flex flex-column gap-2">
                            <button type="submit" class="btn btn-primary-custom w-100 py-3">
                                <i class="fa-solid fa-shield-check me-2"></i>Save New Password
                            </button>
                            <a href="{% url 'forgot_password' %}" class="btn btn-secondary-custom w-100 py-3 text-center">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
