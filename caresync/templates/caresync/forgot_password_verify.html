{% extends 'caresync/base.html' %}

{% block public_content %}
<section class="py-5 bg-light-subtle d-flex align-items-center" style="min-height: 80vh;">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 animate-fade-in">
                <div class="glass-panel p-4 p-md-5 border-2 shadow-lg">
                    <div class="text-center mb-4">
                        <img src="/static/images/logo2.png?v=2" alt="CareSync Logo" class="mb-3" style="height: 60px;">
                        <h2 class="fw-bold font-heading mb-1 text-dark" style="color: var(--text-main) !important;">Verify Security Code</h2>
                        <p class="text-muted small">We've sent a 6-digit verification code to <strong>{{ email }}</strong>. The code expires in 5 minutes.</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-muted small">Verification Code (OTP)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25"><i class="fa-solid fa-key text-muted"></i></span>
                                <input type="text" name="otp" class="form-control border-start-0 border-secondary border-opacity-25 text-center fs-4 fw-bold letter-spacing-lg" placeholder="••••••" maxlength="6" pattern="\d{6}" required autocomplete="one-time-code">
                            </div>
                        </div>
                        
                        <div class="d-flex flex-column gap-2 mb-3">
                            <button type="submit" class="btn btn-primary-custom w-100 py-3">
                                <i class="fa-solid fa-shield-check me-2"></i>Verify and Proceed
                            </button>
                            <a href="{% url 'forgot_password_resend_otp' %}" class="btn btn-secondary-custom w-100 py-3 text-center">
                                <i class="fa-solid fa-arrow-rotate-right me-2"></i>Resend Code
                            </a>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'forgot_password' %}" class="text-primary small fw-semibold">
                                Use a different email address
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
