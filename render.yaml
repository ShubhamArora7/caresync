databases:
  - name: caresync-db
    databaseName: caresync
    user: admin
    plan: free

services:
  - type: web
    name: caresync
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && python create_superuser.py && gunicorn caresync_project.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caresync-db
          property: connectionString