databases:
  - name: caresync-db
    databaseName: caresync
    user: admin
    plan: free

services:
  - type: web
    name: caresync
    env: docker
    plan: free
    dockerCommand: "sh -c 'python manage.py migrate && python create_superuser.py && gunicorn caresync_project.wsgi:application --bind 0.0.0.0:10000'"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caresync-db
          property: connectionString